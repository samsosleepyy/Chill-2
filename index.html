<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Addon Maker - Ultimate Pro</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .input-container { position: relative; width: 100%; }
        .input-dark {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s;
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            outline: none;
        }
        .input-dark:focus {
            border-color: #a78bfa;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.3);
        }

        .input-number-minimal {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            padding: 2px 8px;
            border-radius: 6px;
            width: 80px;
            text-align: center;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s;
        }

        .custom-placeholder {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            transition: all 0.2s ease-out;
            font-size: 0.9rem;
            user-select: none;
        }
        
        .input-dark:focus + .custom-placeholder,
        .input-dark:not(:placeholder-shown) + .custom-placeholder {
            opacity: 0;
            transform: translateY(-50%) translateX(10px);
        }

        .search-dropdown { position: relative; }
        .search-results {
            position: absolute;
            top: 105%;
            left: 0;
            width: 100%;
            max-height: 240px;
            overflow-y: auto;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 0.75rem;
            z-index: 50;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            display: none;
        }
        .search-results.show { display: block; animation: slideDown 0.2s ease-out; }
        .search-item { padding: 0.6rem 1rem; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }
        .search-item:hover { background: #334155; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 5px; }
        .slot-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .slot-item:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
        .slot-item.selected {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8b5cf6;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }
        .slot-icon { font-size: 24px; margin-bottom: 5px; display: block; }

        .btn-glow:hover { box-shadow: 0 0 25px rgba(139, 92, 246, 0.6); }
        
        .toggle-checkbox:checked { right: 0; border-color: #8b5cf6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #8b5cf6; }
        .toggle-label { width: 44px; height: 24px; background-color: #334155; border-radius: 9999px; position: relative; cursor: pointer; transition: background-color 0.2s ease-in; }
        .toggle-label:after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background-color: #fff; border-radius: 50%; transition: transform 0.2s cubic-bezier(0.4, 0.0, 0.2, 1); }
        input:checked + .toggle-label:after { transform: translateX(20px); }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #a78bfa; margin-top: -7px; cursor: pointer; transition: transform 0.1s; box-shadow: 0 0 10px rgba(167, 139, 250, 0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #475569; border-radius: 2px; }

        @keyframes modalEnter { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .modal-overlay { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); z-index: 100; animation: fadeIn 0.2s ease-out; }
        .modal-content { animation: modalEnter 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.5); border-radius: 4px; }
        
        /* Video Joke Overlay */
        .joke-overlay {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease-out;
        }
        .joke-video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4 flex justify-center items-start">

    <div id="root" class="w-full max-w-6xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const APP_CONFIG = {
            ENABLE_SMOOTH_HEAD: true,
            ENABLE_LOCK_SYSTEM: true
        };

        const MINECRAFT_EFFECTS = [
            { id: "none", name: "ไม่ใส่เอฟเฟกต์ (None)", icon: "🚫" },
            { id: "speed", name: "ความเร็ว (Speed)", icon: "⚡" },
            { id: "haste", name: "เร่งขุด (Haste)", icon: "⛏️" },
            { id: "strength", name: "ความแข็งแกร่ง (Strength)", icon: "💪" },
            { id: "jump_boost", name: "กระโดดสูง (Jump Boost)", icon: "🦘" },
            { id: "regeneration", name: "ฟื้นฟูเลือด (Regeneration)", icon: "💖" }
        ];

        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const IconSettings = () => <IconBase><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconBase>;
        const IconLock = ({size=20}) => <IconBase size={size} className="text-red-400"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconBase>;
        const IconUnlock = () => <IconBase size={20} className="text-green-400"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></IconBase>;
        const IconZap = ({size=20}) => <IconBase size={size} className="text-yellow-400"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></IconBase>;
        const IconImage = () => <IconBase><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconBase>;
        const IconDownload = () => <IconBase><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></IconBase>;
        const IconSearch = () => <IconBase size={18}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></IconBase>;
        const IconAlert = ({size=24}) => <IconBase size={size} className="text-yellow-500"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>;
        const IconFileJson = ({size=18}) => <IconBase size={size}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></IconBase>;
        const IconPlus = ({size=18}) => <IconBase size={size}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconBase>;
        const IconTrash = ({size=18}) => <IconBase size={size}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>;
        const IconPlay = ({size=18}) => <IconBase size={size}><polygon points="5 3 19 12 5 21 5 3"/></IconBase>;

        const CustomModal = ({ isOpen, onClose, title, message, type }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50" onClick={onClose}>
                    <div className="bg-[#1e293b] border border-gray-600 p-6 rounded-2xl max-w-sm w-full shadow-2xl modal-content text-center relative overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-violet-500 to-fuchsia-500"></div>
                        <div className={`mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 ${type === 'error' ? 'bg-red-500/10 text-red-400' : type === 'success' ? 'bg-green-500/10 text-green-400' : 'bg-yellow-500/10 text-yellow-400'}`}>
                            {type === 'error' ? <IconLock size={32} /> : type === 'success' ? <IconUnlock size={32} /> : <IconAlert size={32} />}
                        </div>
                        <h3 className="text-xl font-bold text-white mb-2">{title}</h3>
                        <p className="text-gray-300 mb-6 text-sm leading-relaxed whitespace-pre-line text-left bg-black/20 p-3 rounded-lg border border-gray-700 max-h-48 overflow-y-auto custom-scroll">{message}</p>
                        <button onClick={onClose} className="w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 shadow-lg shadow-indigo-500/20 transition transform hover:scale-[1.02] active:scale-95">
                            รับทราบ (OK)
                        </button>
                    </div>
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, onConfirm, onCancel, title, message }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50" onClick={onCancel}>
                    <div className="bg-[#1e293b] border border-gray-600 p-6 rounded-2xl max-w-sm w-full shadow-2xl modal-content text-center relative overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-yellow-500 to-orange-500"></div>
                        <div className="mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-yellow-500/10 text-yellow-400">
                            <IconAlert size={32} />
                        </div>
                        <h3 className="text-xl font-bold text-white mb-2">{title}</h3>
                        <p className="text-gray-300 mb-6 text-sm leading-relaxed whitespace-pre-line text-left bg-black/20 p-3 rounded-lg border border-gray-700 max-h-48 overflow-y-auto custom-scroll">{message}</p>
                        <div className="flex gap-3">
                            <button onClick={onCancel} className="w-1/2 py-3 rounded-xl font-bold text-gray-300 bg-gray-700 hover:bg-gray-600 transition shadow-lg">
                                ยกเลิก
                            </button>
                            <button onClick={onConfirm} className="w-1/2 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 shadow-lg shadow-green-500/20 transition transform hover:scale-[1.02] active:scale-95">
                                ยินยอม
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const CanvasPreview = ({ imageSrc, showGrid }) => {
            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            const [imageObj, setImageObj] = useState(null);

            useEffect(() => {
                if (imageSrc) {
                    const img = new Image();
                    img.src = imageSrc;
                    img.onload = () => setImageObj(img);
                } else {
                    setImageObj(null);
                }
            }, [imageSrc]);

            useEffect(() => {
                const canvas = canvasRef.current;
                const container = containerRef.current;
                if (!canvas || !container || !imageObj) {
                    if(canvas) {
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                    return;
                }
                const ctx = canvas.getContext('2d');
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.imageSmoothingEnabled = false;
                
                const scale = Math.min((canvas.width - 40) / imageObj.width, (canvas.height - 40) / imageObj.height);
                const x = (canvas.width - imageObj.width * scale) / 2;
                const y = (canvas.height - imageObj.height * scale) / 2;

                ctx.save();
                ctx.translate(x, y);
                ctx.scale(scale, scale);
                ctx.drawImage(imageObj, 0, 0);
                
                if (showGrid) {
                    ctx.beginPath();
                    ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
                    ctx.lineWidth = 1 / scale;
                    for (let px = 0; px <= imageObj.width; px++) { ctx.moveTo(px, 0); ctx.lineTo(px, imageObj.height); }
                    for (let py = 0; py <= imageObj.height; py++) { ctx.moveTo(0, py); ctx.lineTo(imageObj.width, py); }
                    ctx.stroke();
                }
                ctx.restore();
            }, [imageObj, showGrid]);

            return (
                <div ref={containerRef} className="w-full h-80 bg-gray-900/80 border-2 border-dashed border-gray-600 rounded-xl relative overflow-hidden"
                     style={{ backgroundImage: 'linear-gradient(45deg, #1f2937 25%, transparent 25%), linear-gradient(-45deg, #1f2937 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1f2937 75%), linear-gradient(-45deg, transparent 75%, #1f2937 75%)', backgroundSize: '20px 20px', backgroundPosition: '0 0, 0 10px, 10px -10px, -10px 0px', touchAction: 'none' }}>
                    {!imageObj && <div className="absolute inset-0 flex items-center justify-center text-gray-500 pointer-events-none">ยังไม่มีรูปภาพ</div>}
                    <canvas ref={canvasRef} className="absolute inset-0 w-full h-full" />
                </div>
            );
        };

        const App = () => {
            const [packConfig, setPackConfig] = useState({ packName: "", description: "" });
            const [itemConfig, setItemConfig] = useState({
                itemName: "", itemId: "", isLocked: true, xboxNames: [], currentXboxName: "", giveOnSpawn: true,
                isSmoothHead: true, effect: "none", effectLevel: "", armorSlot: "slot.armor.head",
                textureDataUrl: null, itemTextureDataUrl: null,
                geometryFileName: "", geometryBones: [], geometryDataContent: null,
                animationFileName: "", animatedBones: [], animationDataContent: null
            });

            const [savedItems, setSavedItems] = useState([]);
            const [showGrid, setShowGrid] = useState(false);
            const [modalState, setModalState] = useState({ isOpen: false, title: "", message: "", type: "info" });
            const [confirmState, setConfirmState] = useState({ isOpen: false });
            const [searchTerm, setSearchTerm] = useState("");
            const [showEffectList, setShowEffectList] = useState(false);
            
            // สถานะสำหรับการทำ April Fools Video
            const [playJoke, setPlayJoke] = useState(false);

            const showModal = (title, message, type = "info") => setModalState({ isOpen: true, title, message, type });
            const closeModal = () => setModalState(prev => ({ ...prev, isOpen: false }));
            const searchRef = useRef(null);

            useEffect(() => { const handleClickOutside = (event) => { if (searchRef.current && !searchRef.current.contains(event.target)) setShowEffectList(false); }; document.addEventListener("mousedown", handleClickOutside); return () => document.removeEventListener("mousedown", handleClickOutside); }, []);

            const handleItemChange = (e) => {
                const { name, value, type, checked } = e.target;
                setItemConfig(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
            };

            const handleAddItemToCart = () => {
                if (!itemConfig.itemId || !itemConfig.itemName || (!itemConfig.textureDataUrl && !itemConfig.itemTextureDataUrl)) {
                    showModal('ข้อมูลไอเทมไม่ครบ', 'กรุณากรอก "ไอดีไอเทม", "ชื่อไอเทมในเกม" และอัปโหลดสกินอย่างน้อย 1 อย่างก่อนเพิ่มลงแพ็ก', 'error');
                    return;
                }
                if (itemConfig.isLocked && itemConfig.xboxNames.length === 0) {
                    showModal('ข้อมูลไม่ครบถ้วน', `คุณเปิดใช้งานระบบล็อคเจ้าของ\nกรุณาเพิ่มชื่อ Xbox Gamertag อย่างน้อย 1 ชื่อ`, 'error'); 
                    return;
                }
                const exists = savedItems.find(i => i.itemId === itemConfig.itemId);
                if (exists) {
                    showModal('ไอเทมซ้ำ', `ไอเทม ID "${itemConfig.itemId}" มีอยู่ในแพ็กแล้ว กรุณาเปลี่ยน ID`, 'error');
                    return;
                }

                setSavedItems([...savedItems, { ...itemConfig, _uid: Date.now() }]);
                showModal('เพิ่มสำเร็จ!', `ไอเทม ${itemConfig.itemName} ถูกเพิ่มลงในแพ็กแล้ว\nคุณสามารถสร้างไอเทมชิ้นต่อไปได้เลย`, 'success');
                
                setItemConfig(prev => ({
                    ...prev, itemName: "", itemId: "", textureDataUrl: null, itemTextureDataUrl: null,
                    geometryFileName: "", geometryBones: [], geometryDataContent: null,
                    animationFileName: "", animatedBones: [], animationDataContent: null
                }));
            };

            const addXboxName = () => {
                if (itemConfig.currentXboxName.trim() !== "" && !itemConfig.xboxNames.includes(itemConfig.currentXboxName.trim())) {
                    setItemConfig(prev => ({ ...prev, xboxNames: [...prev.xboxNames, prev.currentXboxName.trim()], currentXboxName: "" }));
                }
            };
            
            const removeXboxName = (nameToRemove) => { 
                setItemConfig(prev => ({ ...prev, xboxNames: prev.xboxNames.filter(n => n !== nameToRemove) })); 
            };

            const handleFileRead = (file, type) => { 
                if (!file) return;
                const reader = new FileReader();
                
                if (type === 'geometryDataContent') {
                    reader.onload = (event) => {
                        try {
                            let text = event.target.result.replace(/^\uFEFF/, '');
                            text = text.replace(/\u00A0/g, ' '); 
                            text = text.replace(/[“”]/g, '"'); 
                            text = text.replace(/,\s*([}\]])/g, '$1'); 
                            const json = JSON.parse(text);
                            
                            let bonesList = [];
                            if(json["minecraft:geometry"] && json["minecraft:geometry"][0] && json["minecraft:geometry"][0].bones) {
                                let rawBones = json["minecraft:geometry"][0].bones;
                                let boneMap = {};
                                
                                rawBones.forEach(b => {
                                    boneMap[b.name] = { name: b.name, parent: b.parent, children: [], depth: 0 };
                                });
                                
                                Object.values(boneMap).forEach(b => {
                                    if (b.parent && boneMap[b.parent]) {
                                        boneMap[b.parent].children.push(b.name);
                                    }
                                });
                                
                                const calcDepth = (name, d) => {
                                    if (boneMap[name]) {
                                        boneMap[name].depth = d;
                                        boneMap[name].children.forEach(child => calcDepth(child, d + 1));
                                    }
                                };
                                Object.values(boneMap).filter(b => !b.parent || !boneMap[b.parent]).forEach(root => calcDepth(root.name, 0));
                                
                                let orderedBones = [];
                                const traverse = (name) => {
                                    if (boneMap[name]) {
                                        orderedBones.push(boneMap[name]);
                                        boneMap[name].children.forEach(child => traverse(child));
                                    }
                                };
                                Object.values(boneMap).filter(b => !b.parent || !boneMap[b.parent]).forEach(root => traverse(root.name));
                                
                                bonesList = orderedBones;
                            }

                            setItemConfig(prev => ({ 
                                ...prev, 
                                geometryFileName: file.name,
                                geometryDataContent: text,
                                geometryBones: bonesList,
                                animationFileName: "",
                                animatedBones: []
                            }));
                        } catch (e) {

                                        <div className="flex flex-col gap-1 max-h-32 overflow-y-auto custom-scroll pr-2">
                                            {itemConfig.geometryBones.map((b, i) => (
                                                <div key={i} style={{ paddingLeft: `${b.depth * 12}px` }} className="flex items-center">
                                                    {b.depth > 0 && <span className="text-gray-500 mr-1 text-[10px]">└</span>}
                                                    <span className={`px-2 py-0.5 rounded text-[10px] border shadow-sm transition-colors duration-300 ${itemConfig.animatedBones.includes(b.name) ? 'bg-blue-500/20 border-blue-400 text-blue-200 shadow-blue-500/20' : 'bg-gray-700/80 border-gray-500/50 text-gray-200'}`}>
                                                        {b.name}
                                                    </span>
                                                    {itemConfig.animatedBones.includes(b.name) && <span className="ml-1 text-[10px] animate-pulse">✨</span>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <button onClick={handleGenerate} className="w-full py-4 rounded-2xl font-bold text-lg shadow-xl transform transition hover:-translate-y-1 flex items-center justify-center gap-2 bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white hover:shadow-violet-500/40 btn-glow">
                            <IconDownload/> ดาวน์โหลด ({savedItems.length || 1} ไอเทม)
                        </button>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
